services:
  catalog.db:
    container_name: catalog.db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  basket.db:
    container_name: basket.db
    restart: always
    ports:
      - "6379:6379"
        
  discount.db:
    container_name: discount.db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=Password@123
      - POSTGRES_DB=DiscountDb
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  ordering.db:
    container_name: ordering.db
    environment:
      - SA_PASSWORD=Password@123
      - ACCEPT_EULA=Y
    restart: always
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL","/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'Password@123' -Q 'select 1'"]
      interval: 10s
      timeout: 10s
      retries: 3
      
  catalog.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DatabaseSettings__ConnectionString=mongodb://catalog.db:27017
      - DatabaseSettings__DatabaseName=CatalogDb
      - DatabaseSettings__ProductCollectionName=Products
      - DatabaseSettings__BrandCollectionName=Brands
      - DatabaseSettings__TypeCollectionName=Types
    depends_on:
      - catalog.db
    ports:
      - "8010:8080"
      - "8011:8081"
        
  basket.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - CacheSettings__ConnectionString=basket.db:6379
      - GrpcSettings__DiscountUrl=http://discount.api:8080
    depends_on:
      - basket.db
    ports:
      - "8020:8080"
      - "8021:8081"
  
  discount.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DatabaseSettings__ConnectionString=Server=discount.db;Port=5432;Database=DiscountDb;User Id=admin;Password=Password@123
    depends_on:
      - discount.db
    ports:
      - "8030:8080"
      - "8031:8081"

  ordering.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DatabaseSettings__ConnectionString=Server=ordering.db;Port=1433;Database=OrderingDb;User Id=admin;Password=Password@123
    depends_on:
      - ordering.db
    ports:
      - "8040:8080"
      - "8041:8081"